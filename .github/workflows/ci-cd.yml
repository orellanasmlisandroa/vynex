name: VYNEX CI-CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Instalar Dependencias del Backend
        run: |
          cd backend
          npm install

      - name: Validar Sintaxis de Archivos Base
        run: |
          cd backend
          node --check src/index.js

  frontends-build-validation:
    runs-on: ubuntu-latest
    needs: backend-validation
    steps:
      - name: Checkout Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Validar Frontend Admin
        run: |
          cd frontend-admin
          npm install
          npm run build --if-present

      - name: Validar Frontend Business
        run: |
          cd frontend-business
          npm install
          npm run build --if-present

      - name: Validar Frontend User
        run: |
          cd frontend-user
          npm install
          npm run build --if-present
